<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Eanova - Send Message</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="background-blur">
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <main class="app" id="app">
    <form id="messageForm">
      <section class="top-row">
        <div class="name-box">
          <svg class="name-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2"/>
            <path d="M20 21C20 16.5817 16.4183 14 12 14C7.58172 14 4 16.5817 4 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>

          <input
            id="name"
            type="text"
            maxlength="50"
            placeholder="Name"
            required
          />
        </div>

        <div class="count-title">
          No. of texts <span id="textCount">0</span>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">Raised</div>
          <div class="progress-money" id="progressMoney">$0 / $100,000 · 0%</div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-glow" id="progressGlow"></div>
          </div>
        </div>
      </section>

      <section class="message-area">
        <div class="message-box">
          <textarea
            id="message"
            maxlength="1000"
            placeholder="Type your message here..."
            required
          ></textarea>

          <div class="send-section">
            <button class="send-btn" id="sendBtn" type="submit" aria-label="Send message">
              <svg class="send-icon" viewBox="0 0 24 24" fill="none">
                <path
                  d="M4 12L20 4L16 20L12 14L4 12Z"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section class="bottom-row">
        <div id="status" class="status"></div>
      </section>
    </form>

    <div class="tiny-info">
      Messages are sent privately. No login needed.
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
