<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Eanova Text Fund</title>

  <link rel="stylesheet" href="style.css?v=3" />
</head>

<body>
  <div class="background-blur">
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <main class="app" id="app">
    <form id="messageForm">
      <section class="hero-copy">
        <p class="eyebrow">Eanova Text Fund</p>
        <p class="subtitle">
          Share a joke, story, kind message on this site help support the fundraiser.
        </p>
      </section>

      <section class="top-row">
        <div class="name-box">
          <svg class="name-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2"/>
            <path d="M20 21C20 16.5817 16.4183 14 12 14C7.58172 14 4 16.5817 4 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>

          <input
            id="name"
            type="text"
            maxlength="50"
            placeholder="Name"
            required
          />
        </div>

        <div class="count-title">
          Texts Sent <span id="textCount">0</span>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">Raised</div>
          <div class="progress-money" id="progressMoney">$0 / $100,000 · 0%</div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-glow" id="progressGlow"></div>
          </div>
        </div>
      </section>

      <section class="prompt-row">
        <span class="prompt-pill">Prompt: Write a joke, tiny story, kind message, or idea.</span>
      </section>

      <section class="message-area">
        <div class="message-box">
          <textarea
            id="message"
            maxlength="1000"
            placeholder="Write a joke, story, message, or idea..."
            required
          ></textarea>

          <div class="send-section">
            <button class="send-btn" id="sendBtn" type="submit" aria-label="Send and support">
              <svg class="send-icon" viewBox="0 0 24 24" fill="none">
                <path
                  d="M4 12L20 4L16 20L12 14L4 12Z"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <span class="send-label">Send & Support</span>
          </div>
        </div>
      </section>

      <section class="bottom-row">
        <div id="status" class="status"></div>
      </section>
    </form>

    <section class="ad-section" aria-label="Advertisement">
      <p class="ad-label">Advertisement</p>

      <div class="banner-ad">
        <script>
          atOptions = {
            'key' : '5f9b9aed42cfd943b38e2bc84cc482b1',
            'format' : 'iframe',
            'height' : 250,
            'width' : 300,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/5f9b9aed42cfd943b38e2bc84cc482b1/invoke.js"></script>
      </div>
    </section>

    <div class="tiny-info">
      No payment needed. Activity and ads on this site help support the fund.
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js?v=3"></script>
</body>
</html>
