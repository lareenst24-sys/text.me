<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Eanova - Send Message</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #ffffff;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --border: rgba(120, 190, 255, 0.35);
      --blue: #38bdf8;
      --blue-strong: #0ea5e9;
      --text: #182033;
      --muted: #7b879c;
      --danger: #ef4444;
      --success: #22c55e;
      --shadow: rgba(56, 189, 248, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(56, 189, 248, 0.22), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #f7fbff 45%, #eef8ff 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .background-blur {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.14);
      filter: blur(70px);
      animation: float 8s ease-in-out infinite;
    }

    .orb.one {
      top: 8%;
      left: 10%;
    }

    .orb.two {
      right: 8%;
      bottom: 12%;
      animation-delay: -3s;
      background: rgba(14, 165, 233, 0.12);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-22px);
      }
    }

    .app {
      position: relative;
      z-index: 2;
      width: min(1180px, 100%);
      min-height: 650px;
      padding: 42px;
      transform-style: preserve-3d;
      transition: transform 0.18s ease;
    }

    .top-row {
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      align-items: center;
      gap: 24px;
    }

    .name-box,
    .message-box {
      background: var(--panel-strong);
      border: 1px solid var(--border);
      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.06),
        0 0 22px rgba(56, 189, 248, 0.16),
        inset 0 0 18px rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
    }

    .name-box {
      height: 66px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
    }

    .name-icon {
      width: 24px;
      height: 24px;
      color: var(--blue-strong);
      flex: 0 0 auto;
    }

    input,
    textarea {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
    }

    input::placeholder,
    textarea::placeholder {
      color: #8d99aa;
    }

    .count-title {
      text-align: center;
      font-size: 27px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1f2a44;
    }

    .count-title span {
      color: var(--blue-strong);
    }

    .progress-wrap {
      width: 100%;
    }

    .progress-label {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #344054;
    }

    .progress-track {
      position: relative;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(56, 189, 248, 0.32);
      overflow: hidden;
      box-shadow:
        inset 0 0 12px rgba(56, 189, 248, 0.12),
        0 0 18px rgba(56, 189, 248, 0.18);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7dd3fc, #38bdf8, #0ea5e9);
      box-shadow: 0 0 18px rgba(14, 165, 233, 0.5);
      transition: width 0.45s ease;
    }

    .progress-glow {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: rgba(56, 189, 248, 0.45);
      filter: blur(8px);
      transition: left 0.45s ease;
    }

    .message-area {
      margin-top: 115px;
      display: flex;
      justify-content: center;
    }

    .message-box {
      width: min(960px, 100%);
      min-height: 170px;
      border-radius: 30px;
      display: grid;
      grid-template-columns: 1fr 92px;
      overflow: hidden;
    }

    textarea {
      min-height: 170px;
      resize: none;
      padding: 34px;
      line-height: 1.6;
      font-size: 15px;
    }

    .send-section {
      border-left: 1px solid rgba(56, 189, 248, 0.24);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      border: 1px solid rgba(56, 189, 248, 0.35);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(230, 248, 255, 0.96));
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue-strong);
      box-shadow:
        0 0 26px rgba(56, 189, 248, 0.32),
        0 12px 25px rgba(15, 23, 42, 0.08);
      transition: 0.22s ease;
      animation: pulse 2.2s ease-in-out infinite;
    }

    .send-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow:
        0 0 38px rgba(56, 189, 248, 0.46),
        0 18px 30px rgba(15, 23, 42, 0.1);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      animation: none;
      transform: none;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow:
          0 0 24px rgba(56, 189, 248, 0.28),
          0 12px 25px rgba(15, 23, 42, 0.08);
      }

      50% {
        box-shadow:
          0 0 42px rgba(56, 189, 248, 0.48),
          0 12px 25px rgba(15, 23, 42, 0.08);
      }
    }

    .send-icon {
      width: 29px;
      height: 29px;
    }

    .bottom-row {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }

    .status {
      min-height: 24px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--danger);
    }

    .tiny-info {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 850px) {
      body {
        overflow: auto;
        padding: 16px;
        align-items: flex-start;
      }

      .app {
        width: 100%;
        min-height: 100vh;
        padding: 34px 6px 24px;
        transform: none !important;
      }

      .top-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "name progress"
          "count count";
        gap: 18px;
        align-items: center;
      }

      .name-box {
        grid-area: name;
        height: 52px;
        border-radius: 17px;
        padding: 0 13px;
        gap: 9px;
      }

      .name-icon {
        width: 21px;
        height: 21px;
      }

      input {
        font-size: 15px;
      }

      .progress-wrap {
        grid-area: progress;
        width: 100%;
      }

      .progress-label {
        font-size: 15px;
        margin-bottom: 7px;
        text-align: right;
      }

      .progress-track {
        height: 13px;
      }

      .progress-glow {
        width: 20px;
        height: 20px;
      }

      .count-title {
        grid-area: count;
        text-align: center;
        font-size: 27px;
        margin-top: 28px;
      }

      .message-area {
        margin-top: 34px;
        display: flex;
        justify-content: center;
      }

      .message-box {
        width: 100%;
        min-height: 390px;
        border-radius: 30px;
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 90px;
        overflow: hidden;
      }

      textarea {
        min-height: 300px;
        padding: 26px 24px;
        font-size: 14px;
        line-height: 1.6;
      }

      .send-section {
        border-left: none;
        border-top: 1px solid rgba(56, 189, 248, 0.22);
        padding: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .send-btn {
        width: 62px;
        height: 62px;
        border-radius: 21px;
      }

      .send-icon {
        width: 30px;
        height: 30px;
      }

      .bottom-row {
        margin-top: 18px;
      }

      .tiny-info {
        position: static;
        margin-top: 46px;
        padding: 0 20px;
        font-size: 13px;
        line-height: 1.5;
      }
    }

    @media (max-width: 420px) {
      .app {
        padding-left: 2px;
        padding-right: 2px;
      }

      .top-row {
        gap: 14px;
      }

      .name-box {
        height: 50px;
        padding: 0 11px;
      }

      input {
        font-size: 14px;
      }

      .progress-label {
        font-size: 14px;
      }

      .count-title {
        font-size: 25px;
      }

      .message-box {
        min-height: 380px;
      }

      textarea {
        min-height: 290px;
        padding: 24px 20px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="background-blur">
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <main class="app" id="app">
    <form id="messageForm">
      <section class="top-row">
        <div class="name-box">
          <svg class="name-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2"/>
            <path d="M20 21C20 16.5817 16.4183 14 12 14C7.58172 14 4 16.5817 4 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>

          <input
            id="name"
            type="text"
            maxlength="50"
            placeholder="Name"
            required
          />
        </div>

        <div class="count-title">
          No. of texts <span id="textCount">0</span>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">Progress</div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-glow" id="progressGlow"></div>
          </div>
        </div>
      </section>

      <section class="message-area">
        <div class="message-box">
          <textarea
            id="message"
            maxlength="1000"
            placeholder="Type your message here..."
            required
          ></textarea>

          <div class="send-section">
            <button class="send-btn" id="sendBtn" type="submit" aria-label="Send message">
              <svg class="send-icon" viewBox="0 0 24 24" fill="none">
                <path
                  d="M4 12L20 4L16 20L12 14L4 12Z"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section class="bottom-row">
        <div id="status" class="status"></div>
      </section>
    </form>

    <div class="tiny-info">
      Messages are sent privately. No login needed.
    </div>
  </main>

  <script>
    const SUPABASE_URL = "PASTE_YOUR_SUPABASE_URL_HERE";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const app = document.getElementById("app");
    const form = document.getElementById("messageForm");
    const nameInput = document.getElementById("name");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const statusBox = document.getElementById("status");
    const textCount = document.getElementById("textCount");
    const progressFill = document.getElementById("progressFill");
    const progressGlow = document.getElementById("progressGlow");

    let sentCount = Number(localStorage.getItem("eanova_sent_count") || 0);
    updateCounter();

    document.addEventListener("mousemove", (event) => {
      const x = (event.clientX / window.innerWidth) * 100;
      const y = (event.clientY / window.innerHeight) * 100;

      document.body.style.setProperty("--mouse-x", x + "%");
      document.body.style.setProperty("--mouse-y", y + "%");

      if (window.innerWidth > 850) {
        const rotateX = (event.clientY / window.innerHeight - 0.5) * -5;
        const rotateY = (event.clientX / window.innerWidth - 0.5) * 5;

        app.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }
    });

    document.addEventListener("mouseleave", () => {
      app.style.transform = "rotateX(0deg) rotateY(0deg)";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const message = messageInput.value.trim();

      clearStatus();

      if (!name) {
        showError("Enter your name first.");
        return;
      }

      if (!message) {
        showError("Write a message first.");
        return;
      }

      if (name.length > 50) {
        showError("Name is too long.");
        return;
      }

      if (message.length > 1000) {
        showError("Message is too long.");
        return;
      }

      sendBtn.disabled = true;

      const { error } = await supabaseClient
        .from("messages")
        .insert([
          {
            name: name,
            message: message
          }
        ]);

      if (error) {
        console.error(error);
        showError("Message failed. Check Supabase keys or table policy.");
        sendBtn.disabled = false;
        return;
      }

      sentCount++;
      localStorage.setItem("eanova_sent_count", sentCount);
      updateCounter();

      messageInput.value = "";
      showSuccess("Message sent ✅");

      sendBtn.disabled = false;
    });

    function updateCounter() {
      textCount.textContent = sentCount;

      const maxVisual = 10;
      const percentage = Math.min((sentCount / maxVisual) * 100, 100);

      progressFill.style.width = percentage + "%";
      progressGlow.style.left = percentage + "%";
    }

    function showSuccess(text) {
      statusBox.textContent = text;
      statusBox.className = "status success";
    }

    function showError(text) {
      statusBox.textContent = text;
      statusBox.className = "status error";
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }
  </script>
</body>
</html>
